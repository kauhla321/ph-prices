name: Diagnose PDF Parsing

# Read-only: dumps how pdfplumber sees today's DA PDF so we can see why a
# commodity section is missing. Does NOT write or commit prices.json.
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Dump raw PDF structure
        run: python update.py --debug
